# ============================================================
# 01-metallb-config.yaml
# MetalLB Layer2 모드 IP 주소 풀 설정
# ============================================================
#
# [MetalLB 개요]
# 베어메탈 / 가상머신 환경에서는 클라우드 LoadBalancer가 없으므로
# MetalLB가 대신 외부 IP를 할당합니다.
#
# [IP 풀 선택 기준]
#   - VMware NAT 서브넷(VMnet8) 내부의 고정 IP 구간을 사용합니다.
#   - VMware DHCP 할당 범위와 겹치지 않아야 합니다.
#   - VMware Virtual Network Editor(vmnetcfg.exe)에서 VMnet8의
#     DHCP 범위를 확인하고 아래 addresses 값을 조정하세요.
#   - 기본 VMware NAT DHCP 범위: 192.168.100.128 ~ 192.168.100.253
#     → MetalLB 풀:              192.168.100.200 ~ 192.168.100.220
#       (DHCP 시작 주소를 .200 이상으로 줄여야 충돌 방지)
#
# [Layer2 모드 동작 원리]
#   MetalLB Speaker 파드가 ARP(IPv4) / NDP(IPv6) 응답을 통해
#   풀 IP를 가상 네트워크 상에 공개합니다.
#   같은 L2 세그먼트(VMware NAT 가상 스위치)에 있는 호스트라면
#   해당 IP로 직접 접근할 수 있습니다.
#
# 주의: METALLB_IP_RANGE 환경변수로 setup-vmware-k8s.sh가
#       이 파일의 addresses 값을 자동으로 치환합니다.
# ============================================================

apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: bankrag-pool
  namespace: metallb-system
  annotations:
    note: "VMware NAT(VMnet8) 대역에서 DHCP 범위 밖 구간을 사용하세요"
spec:
  # DHCP 범위와 겹치지 않는 고정 IP 구간
  # setup-vmware-k8s.sh 실행 시 --metallb-range 옵션으로 덮어씁니다.
  addresses:
    - 192.168.100.200-192.168.100.220
  # autoAssign: true 이면 LoadBalancer 서비스에 자동 할당
  autoAssign: true

---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: bankrag-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - bankrag-pool
  # nodeSelectors: []  # 비어 있으면 모든 노드에서 ARP 응답
