# ============================================================
# 12-minio.yaml  –  MinIO 오브젝트 스토리지
# 접근: http://minio.bankrag.local  (콘솔 UI)
# 자격증명: minio / minio1234
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: bankrag
  annotations:
    # ⚠ SECURITY: 배포 전 반드시 아래 자격증명을 변경하세요.
    # setup-vmware-k8s.sh 실행 시 --minio-password 옵션으로 주입하거나
    # kubectl create secret generic minio-secret \
    #   --from-literal=root-user=<user> \
    #   --from-literal=root-password=<strong-password> \
    #   -n bankrag 으로 생성하세요.
type: Opaque
stringData:
  root-user: minio
  # ⚠ CHANGE FOR PRODUCTION – well-known default, unauthorized access risk
  root-password: minio1234

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: bankrag
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: bankrag
  labels:
    app: minio
    app.kubernetes.io/part-of: bankrag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          # 폐쇄망 모드: registry.local:5000/minio/minio:RELEASE.2024-06-04T19-20-08Z
          image: minio/minio:RELEASE.2024-06-04T19-20-08Z
          imagePullPolicy: IfNotPresent
          command: ["server", "/data", "--console-address", ":9001"]
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-password
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data

---
# minio-init: bankrag-docs 버킷 자동 생성 (Job)
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: bankrag
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          # 폐쇄망 모드: registry.local:5000/minio/mc:RELEASE.2024-06-03T15-58-26Z
          image: minio/mc:RELEASE.2024-06-03T15-58-26Z
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set local http://minio:9000 minio minio1234; do
                echo "MinIO 준비 중..."; sleep 3
              done
              mc mb -p local/bankrag-docs || true
              mc anonymous set download local/bankrag-docs || true
              echo "MinIO 초기화 완료"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: bankrag
  labels:
    app: minio
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
