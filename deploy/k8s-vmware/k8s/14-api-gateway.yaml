    spec:
      containers:
        - name: llamaindex-py
          image: registry.local:5000/llamaindex-py:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ENV
              value: "production"
            - name: QDRANT_URL
              value: "http://qdrant:6333"
            - name: LLM_PROVIDER
              value: "ollama"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: OLLAMA_LLM_MODEL
              value: "llama3.1:8b"
            - name: OLLAMA_EMBED_MODEL
              value: "nomic-embed-text"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
            - name: SERVICE_NAMESPACE
              value: "bankrag"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: llamaindex-py
  namespace: bankrag
spec:
  selector:
    app: llamaindex-py
  ports:
    - port: 8000
      targetPort: 8000

---
# config/tenants.yaml, config/users.json → ConfigMap 으로 마운트
apiVersion: v1
kind: ConfigMap
metadata:
  name: bankrag-config
  namespace: bankrag
binaryData: {}
# setup-vmware-k8s.sh 가 실행 시 아래 data 필드를 실제 파일 내용으로 채웁니다.
# kubectl create configmap bankrag-config \
#   --from-file=tenants.yaml=config/tenants.yaml \
#   --from-file=users.json=config/users.json \
#   -n bankrag --dry-run=client -o yaml | kubectl apply -f -
