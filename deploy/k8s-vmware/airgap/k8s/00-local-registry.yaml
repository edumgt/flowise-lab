# ============================================================
# airgap/k8s/00-local-registry.yaml
# [폐쇄망 전용] 내부 Docker Registry 배포
# ============================================================
# 이 파일은 airgap/kustomization.yaml 에서만 참조됩니다.
# 온라인 모드(k8s/ 디렉토리 직접 apply)에는 포함되지 않습니다.
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: kube-registry
  labels:
    purpose: airgap-registry

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: kube-registry
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 30Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: kube-registry
  labels:
    app: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          # 이 이미지는 02-import-and-push.sh 가 k3s containerd에 미리 import
          image: registry:2.8.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data

---
# NodePort: 30500 → VM 밖에서도 접근 가능
# ClusterIP alias: registry.kube-registry.svc.cluster.local:5000
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: kube-registry
  labels:
    app: registry
spec:
  selector:
    app: registry
  type: NodePort
  ports:
    - name: registry
      port: 5000
      targetPort: 5000
      nodePort: 30500
